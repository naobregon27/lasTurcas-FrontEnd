# Netlify debe leer este archivo en la RAÍZ del repo (no solo dentro de /cliente).
[build]
  base = "cliente"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Refuerzo de seguridad en el navegador (no sustituye certificado HTTPS del dominio).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
